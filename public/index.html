<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>מערכת ניהול תורים - מספרה</title>
  <link rel="stylesheet" href="/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>

  <!-- Login Page -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-cut"></i>
      </div>
      <h1>מערכת ניהול תורים</h1>
      <p class="login-subtitle">היכנס למערכת</p>
      <form id="loginForm">
        <div class="form-group">
          <label><i class="fas fa-user"></i> שם משתמש</label>
          <input type="text" id="loginUsername" placeholder="הזן שם משתמש" required autocomplete="username">
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> סיסמה</label>
          <input type="password" id="loginPassword" placeholder="הזן סיסמה" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-sign-in-alt"></i> התחבר
        </button>
        <div id="loginError" class="error-msg hidden"></div>
      </form>
      <div class="login-hint">
        <small>מערכת ניהול תורים למספרה</small>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appContainer" class="app-container hidden">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="shop-logo">
          <i class="fas fa-cut"></i>
        </div>
        <h2 id="shopName">מספרה</h2>
        <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
          <i class="fas fa-tachometer-alt"></i><span>לוח בקרה</span>
        </a>
        <a href="#" class="nav-item" data-page="calendar">
          <i class="fas fa-calendar-alt"></i><span>יומן תורים</span>
        </a>
        <a href="#" class="nav-item" data-page="appointments">
          <i class="fas fa-clock"></i><span>תורים</span>
        </a>
        <a href="#" class="nav-item" data-page="newAppointment">
          <i class="fas fa-plus-circle"></i><span>תור חדש</span>
        </a>
        <a href="#" class="nav-item" data-page="clients">
          <i class="fas fa-users"></i><span>לקוחות</span>
        </a>
        <a href="#" class="nav-item" data-page="barbers">
          <i class="fas fa-user-tie"></i><span>ספרים</span>
        </a>
        <a href="#" class="nav-item" data-page="services">
          <i class="fas fa-list"></i><span>שירותים</span>
        </a>
        <a href="#" class="nav-item" data-page="settings" id="settingsNav">
          <i class="fas fa-cog"></i><span>הגדרות</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <i class="fas fa-user-circle"></i>
          <span id="currentUserName">מנהל</span>
        </div>
        <button class="btn-logout" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i> יציאה
        </button>
      </div>
    </aside>
    <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <button class="sidebar-toggle" id="sidebarToggle">
          <i class="fas fa-bars"></i>
        </button>
        <h1 id="pageTitle">לוח בקרה</h1>
        <div class="top-bar-actions">
          <span class="today-date" id="todayDate"></span>
        </div>
      </header>

      <div class="content-area" id="contentArea">
        <!-- Dynamic content loaded here -->
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">כותרת</h3>
        <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="/js/app.js"></script>
</body>
</html>
