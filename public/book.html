<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>הזמנת תור</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #4F46E5;
      --primary-light: #818CF8;
      --primary-dark: #3730A3;
      --success: #10B981;
      --danger: #EF4444;
      --bg: #F1F5F9;
      --bg-card: #FFFFFF;
      --text: #1E293B;
      --text-secondary: #64748B;
      --text-light: #94A3B8;
      --border: #E2E8F0;
      --shadow: 0 1px 3px rgba(0,0,0,.1);
      --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
      --radius: 12px;
      --radius-sm: 8px;
      --font: 'Heebo', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; direction: rtl; min-height: 100vh; }

    .booking-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
      color: white; text-align: center; padding: 2rem 1rem;
    }
    .booking-header .logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .booking-header h1 { font-size: 1.8rem; font-weight: 700; }
    .booking-header p { opacity: 0.9; font-size: 1rem; margin-top: 0.25rem; }
    .shop-details { font-size: 0.85rem; opacity: 0.8; margin-top: 0.5rem; }
    .shop-details i { margin-left: 0.25rem; }

    .container { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

    .step { display: none; }
    .step.active { display: block; }

    .step-indicators { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .step-dot {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 0.85rem; background: var(--border); color: var(--text-light); transition: all .3s;
    }
    .step-dot.active { background: var(--primary); color: white; }
    .step-dot.done { background: var(--success); color: white; }
    .step-line { width: 40px; height: 2px; background: var(--border); align-self: center; }
    .step-line.done { background: var(--success); }

    .card {
      background: var(--bg-card); border-radius: var(--radius); padding: 1.5rem;
      box-shadow: var(--shadow); margin-bottom: 1rem;
    }
    .card h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; color: var(--primary-dark); }
    .card h2 i { margin-left: 0.5rem; }

    .barber-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .barber-card {
      border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 1rem;
      text-align: center; cursor: pointer; transition: all .2s;
    }
    .barber-card:hover { border-color: var(--primary-light); background: #F8F7FF; }
    .barber-card.selected { border-color: var(--primary); background: #EEF2FF; }
    .barber-avatar {
      width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: white; font-size: 1.1rem; margin: 0 auto 0.5rem;
    }
    .barber-card .name { font-weight: 600; font-size: 0.95rem; }
    .barber-card .specialty { font-size: 0.8rem; color: var(--text-secondary); }

    .date-picker { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .date-picker input {
      flex: 1; padding: 0.65rem 0.85rem; border: 2px solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 1rem; outline: none; text-align: center;
    }
    .date-picker input:focus { border-color: var(--primary); }
    .date-nav {
      width: 38px; height: 38px; border: 2px solid var(--border); border-radius: var(--radius-sm);
      background: white; display: flex; align-items: center; justify-content: center; cursor: pointer;
      font-size: 0.9rem; color: var(--text-secondary); transition: all .2s;
    }
    .date-nav:hover { border-color: var(--primary); color: var(--primary); }
    .date-label { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.75rem; }

    .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .slot-btn {
      padding: 0.6rem; border: 2px solid var(--border); border-radius: var(--radius-sm);
      background: white; text-align: center; cursor: pointer; font-family: var(--font);
      font-size: 1rem; font-weight: 500; transition: all .2s;
    }
    .slot-btn:hover { border-color: var(--primary-light); background: #F8F7FF; }
    .slot-btn.selected { border-color: var(--primary); background: var(--primary); color: white; }
    .no-slots { text-align: center; padding: 2rem; color: var(--text-secondary); }
    .no-slots i { font-size: 2rem; margin-bottom: 0.5rem; display: block; color: var(--text-light); }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 0.35rem; font-size: 0.9rem; color: var(--text-secondary); }
    .form-group input {
      width: 100%; padding: 0.65rem 0.85rem; border: 2px solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.95rem; outline: none; background: var(--bg);
    }
    .form-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 1rem; font-weight: 600; cursor: pointer; transition: all .2s;
      width: 100%;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { background: var(--text-light); cursor: not-allowed; }
    .btn-outline {
      background: white; color: var(--text-secondary); border: 2px solid var(--border);
      margin-top: 0.5rem;
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    .summary-row {
      display: flex; justify-content: space-between; padding: 0.6rem 0;
      border-bottom: 1px solid var(--border); font-size: 0.95rem;
    }
    .summary-row:last-child { border: none; }
    .summary-row .label { color: var(--text-secondary); }
    .summary-row .value { font-weight: 600; }

    .success-view { text-align: center; padding: 2rem 0; }
    .success-icon { font-size: 4rem; color: var(--success); margin-bottom: 1rem; }
    .success-view h2 { color: var(--success); font-size: 1.5rem; margin-bottom: 0.5rem; }
    .success-view p { color: var(--text-secondary); margin-bottom: 1.5rem; }
    .success-details { text-align: right; background: var(--bg); border-radius: var(--radius-sm); padding: 1rem; margin-bottom: 1.5rem; }

    .error-msg { color: var(--danger); background: #FEF2F2; padding: 0.75rem; border-radius: var(--radius-sm); margin-top: 0.75rem; text-align: center; font-size: 0.9rem; display: none; }

    .welcome-banner {
      background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
      border: 2px solid #10B981; border-radius: var(--radius); padding: 1rem;
      margin-bottom: 1rem; display: none;
    }
    .welcome-banner.show { display: block; }
    .welcome-banner h3 { color: #065F46; font-size: 1.1rem; margin-bottom: 0.25rem; }
    .welcome-banner p { color: #047857; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .welcome-banner .last-visit-info {
      background: white; border-radius: var(--radius-sm); padding: 0.6rem 0.8rem;
      font-size: 0.85rem; color: var(--text); margin-bottom: 0.5rem;
      border: 1px solid #A7F3D0;
    }
    .welcome-banner .last-visit-info i { color: #10B981; margin-left: 0.3rem; }
    .rebook-btn {
      background: #10B981; color: white; border: none; border-radius: var(--radius-sm);
      padding: 0.5rem 1rem; font-family: var(--font); font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: background .2s;
    }
    .rebook-btn:hover { background: #059669; }
    .loyalty-badge {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.15rem 0.5rem; border-radius: 99px; font-size: 0.75rem;
      font-weight: 600; color: #fff; margin-right: 0.3rem;
    }

    .loading { text-align: center; padding: 2rem; color: var(--text-secondary); }
    .loading i { font-size: 1.5rem; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .barber-grid { grid-template-columns: 1fr; }
      .slots-grid { grid-template-columns: repeat(3, 1fr); }
      .booking-header h1 { font-size: 1.4rem; }
    }

    /* Accessibility */
    .skip-link { position: absolute; top: -100px; right: 0; z-index: 9999; background: var(--primary); color: white; padding: 0.75rem 1.5rem; font-weight: 600; transition: top .2s; text-decoration: none; }
    .skip-link:focus { top: 0; }
    *:focus-visible { outline: 3px solid var(--primary) !important; outline-offset: 2px !important; }
    body.high-contrast { --bg: #000; --bg-card: #1a1a1a; --text: #fff; --text-secondary: #e0e0e0; --border: #555; }
    body.high-contrast input { background: #222 !important; color: #fff !important; border-color: #666 !important; }
    body.high-contrast .booking-header { background: #111; }
    body.highlight-links a { outline: 2px solid var(--primary) !important; text-decoration: underline !important; }
    body.highlight-links button { outline: 2px dashed #F59E0B !important; }

    .a11y-widget { position: fixed; bottom: 1rem; left: 1rem; z-index: 1500; }
    .a11y-toggle {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--primary); color: white; border: 2px solid white;
      font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.2); cursor: pointer;
    }
    .a11y-toggle:hover { background: var(--primary-dark); }
    .a11y-panel {
      position: absolute; bottom: 52px; left: 0;
      background: white; border-radius: var(--radius); padding: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,.1); min-width: 200px; border: 1px solid var(--border);
    }
    .a11y-panel.hidden { display: none; }
    .a11y-panel h4 { font-size: 0.95rem; margin-bottom: 0.75rem; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .a11y-panel button {
      display: flex; align-items: center; gap: 0.5rem; width: 100%;
      padding: 0.5rem 0.75rem; border: none; background: none;
      font-family: var(--font); font-size: 0.88rem; font-weight: 500;
      color: var(--text); border-radius: 8px; cursor: pointer;
    }
    .a11y-panel button:hover { background: var(--bg); color: var(--primary); }
  </style>
</head>
<body>
  <a href="#bookingContent" class="skip-link">דלג לתוכן</a>

  <header class="booking-header" role="banner">
    <div class="logo"><i class="fas fa-cut"></i></div>
    <h1 id="shopTitle">הזמנת תור</h1>
    <p>בחרו ספר, תאריך ושעה - וזהו!</p>
    <div class="shop-details" id="shopDetails"></div>
  </header>

  <div class="container" id="bookingContent" role="main">
    <div class="step-indicators">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot" id="dot2">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot" id="dot3">3</div>
    </div>

    <!-- Step 1: Choose Barber -->
    <div class="step active" id="step1">
      <div class="card">
        <h2><i class="fas fa-user-tie"></i> בחירת ספר</h2>
        <div class="barber-grid" id="barberGrid">
          <div class="loading"><i class="fas fa-spinner"></i><br>טוען...</div>
        </div>
      </div>
    </div>

    <!-- Step 2: Choose Service, Date & Time -->
    <div class="step" id="step2">
      <div class="card" style="margin-bottom:1rem">
        <h2><i class="fas fa-concierge-bell"></i> בחירת שירות</h2>
        <div id="serviceGrid" class="barber-grid">
          <div class="loading"><i class="fas fa-spinner"></i><br>טוען...</div>
        </div>
      </div>
      <div class="card">
        <h2><i class="fas fa-calendar-alt"></i> בחירת תאריך ושעה</h2>
        <div class="date-picker">
          <button class="date-nav" onclick="changeDate(-1)" aria-label="יום קודם"><i class="fas fa-chevron-right" aria-hidden="true"></i></button>
          <input type="date" id="dateInput" aria-label="בחירת תאריך">
          <button class="date-nav" onclick="changeDate(1)" aria-label="יום הבא"><i class="fas fa-chevron-left" aria-hidden="true"></i></button>
        </div>
        <div class="date-label" id="dateLabel"></div>
        <div id="slotsContainer">
          <div class="loading"><i class="fas fa-spinner"></i><br>טוען שעות פנויות...</div>
        </div>
      </div>
      <button class="btn btn-outline" onclick="goToStep(1)"><i class="fas fa-arrow-right"></i> חזרה לבחירת ספר</button>
    </div>

    <!-- Step 3: Client Details -->
    <div class="step" id="step3">
      <div class="welcome-banner" id="welcomeBanner">
        <h3><i class="fas fa-hand-sparkles"></i> <span id="welcomeName"></span></h3>
        <p id="welcomeVisits"></p>
        <div class="last-visit-info" id="lastVisitInfo" style="display:none"></div>
        <button class="rebook-btn" id="rebookBtn" style="display:none" onclick="rebookLast()">
          <i class="fas fa-redo"></i> הזמן שוב את אותו תור
        </button>
      </div>

      <div class="card">
        <h2><i class="fas fa-user"></i> פרטים אישיים</h2>
        <div class="form-group">
          <label for="clientPhone">טלפון</label>
          <input type="tel" id="clientPhone" placeholder="050-1234567" required dir="ltr" oninput="onPhoneInput(this.value)" autocomplete="tel">
        </div>
        <div class="form-group">
          <label for="clientName">שם מלא</label>
          <input type="text" id="clientName" placeholder="הזן את שמך" required autocomplete="name">
        </div>
      </div>

      <div class="card">
        <h2><i class="fas fa-check-circle"></i> סיכום הזמנה</h2>
        <div id="bookingSummary"></div>
      </div>

      <div class="card" style="border:2px solid #E2E8F0">
        <label style="display:flex;align-items:flex-start;gap:0.5rem;cursor:pointer;font-size:0.9rem;color:#334155">
          <input type="checkbox" id="privacyConsent" style="margin-top:0.3rem;width:18px;height:18px;flex-shrink:0">
          <span>אני מאשר/ת כי קראתי את <a href="/privacy.html" target="_blank" style="color:#4F46E5;font-weight:600;text-decoration:underline">מדיניות הפרטיות</a> ומסכים/ה לאיסוף ושמירת הפרטים שלי לצורך ניהול תורים ויצירת קשר בנוגע לתור שנקבע.</span>
        </label>
      </div>

      <div class="error-msg" id="bookingError" role="alert" aria-live="assertive"></div>

      <button class="btn btn-primary" id="confirmBtn" onclick="confirmBooking()">
        <i class="fas fa-calendar-check"></i> אישור הזמנה
      </button>
      <button class="btn btn-outline" onclick="goToStep(2)"><i class="fas fa-arrow-right"></i> חזרה לבחירת שעה</button>
    </div>

    <!-- Success -->
    <div class="step" id="stepSuccess">
      <div class="card">
        <div class="success-view">
          <div class="success-icon"><i class="fas fa-check-circle"></i></div>
          <h2>התור נקבע בהצלחה!</h2>
          <p>נתראה בקרוב</p>
          <div class="success-details" id="successDetails"></div>
          <button class="btn btn-primary" onclick="resetBooking()"><i class="fas fa-plus"></i> הזמנת תור נוסף</button>
        </div>
      </div>
    </div>

    <div style="text-align:center;padding:1.5rem 0 0;color:#94A3B8;font-size:0.8rem">
      <p>נוצר על ידי <strong style="color:#64748B">דניאל כספין - דניטק</strong></p>
    </div>
  </div>

<script>
const DAYS_HE = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];

const state = {
  barbers: [],
  services: [],
  selectedBarber: null,
  selectedService: null,
  selectedDate: null,
  selectedSlot: null,
  currentStep: 1
};

// Init
(async function init() {
  try {
    const [info, barbers, services] = await Promise.all([
      fetch('/api/booking/info').then(r => r.json()),
      fetch('/api/booking/barbers').then(r => r.json()),
      fetch('/api/booking/services').then(r => r.json())
    ]);

    if (info.name) {
      document.getElementById('shopTitle').textContent = info.name;
      document.title = `הזמנת תור - ${info.name}`;
    }
    const details = [];
    if (info.phone) details.push(`<i class="fas fa-phone"></i> ${info.phone}`);
    if (info.address) details.push(`<i class="fas fa-map-marker-alt"></i> ${info.address}`);
    document.getElementById('shopDetails').innerHTML = details.join(' &nbsp;|&nbsp; ');

    state.barbers = barbers;
    state.services = services;
    renderBarbers();
  } catch (e) {
    console.error(e);
    document.getElementById('barberGrid').innerHTML = '<div class="no-slots"><i class="fas fa-exclamation-circle"></i>שגיאה בטעינת נתונים</div>';
  }

  // Set min date to today
  const today = new Date();
  const dateInput = document.getElementById('dateInput');
  dateInput.min = formatDateISO(today);
  dateInput.value = formatDateISO(today);
  dateInput.addEventListener('change', () => {
    state.selectedSlot = null;
    loadSlots();
  });
})();

function formatDateISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderBarbers() {
  const grid = document.getElementById('barberGrid');
  if (!state.barbers.length) {
    grid.innerHTML = '<div class="no-slots"><i class="fas fa-user-slash"></i>אין ספרים זמינים כרגע</div>';
    return;
  }
  grid.innerHTML = state.barbers.map(b => `
    <div class="barber-card" data-id="${b.id}" onclick="selectBarber(${b.id})">
      <div class="barber-avatar" style="background:${b.color || '#4F46E5'}">${b.name.split(' ').map(w=>w[0]).join('').substring(0,2)}</div>
      <div class="name">${b.name}</div>
      <div class="specialty">${b.specialty || 'ספר'}</div>
    </div>
  `).join('');
}

function selectBarber(id) {
  state.selectedBarber = state.barbers.find(b => b.id === id);
  document.querySelectorAll('.barber-card').forEach(c => c.classList.toggle('selected', parseInt(c.dataset.id) === id));
  setTimeout(() => goToStep(2), 200);
}

function renderServices() {
  const grid = document.getElementById('serviceGrid');
  if (!state.services.length) {
    grid.innerHTML = '<div class="no-slots"><i class="fas fa-cut"></i>אין שירותים זמינים</div>';
    return;
  }
  // Auto-select first service
  if (!state.selectedService) state.selectedService = state.services[0];
  grid.innerHTML = state.services.map(s => `
    <div class="barber-card ${state.selectedService && state.selectedService.id === s.id ? 'selected' : ''}" data-id="${s.id}" onclick="selectService(${s.id})">
      <div class="barber-avatar" style="background:${s.color || '#10B981'}"><i class="fas fa-cut"></i></div>
      <div class="name">${s.name}</div>
      <div class="specialty">${s.duration} דק' | ₪${s.price}</div>
    </div>
  `).join('');
}

function selectService(id) {
  state.selectedService = state.services.find(s => s.id === id);
  document.querySelectorAll('#serviceGrid .barber-card').forEach(c => c.classList.toggle('selected', parseInt(c.dataset.id) === id));
  state.selectedSlot = null;
  loadSlots();
}

function goToStep(step) {
  state.currentStep = step;
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(`step${step}`).classList.add('active');

  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById(`dot${i}`);
    dot.classList.remove('active', 'done');
    if (i === step) dot.classList.add('active');
    else if (i < step) dot.classList.add('done');
  }
  for (let i = 1; i <= 2; i++) {
    document.getElementById(`line${i}`).classList.toggle('done', i < step);
  }

  // Clear error when navigating
  document.getElementById('bookingError').style.display = 'none';

  // Scroll to top on step change
  window.scrollTo({ top: 0, behavior: 'smooth' });

  if (step === 2) { renderServices(); loadSlots(); }
  if (step === 3) renderSummary();
}

function changeDate(dir) {
  const input = document.getElementById('dateInput');
  const d = new Date(input.value + 'T00:00:00');
  d.setDate(d.getDate() + dir);
  const today = new Date();
  today.setHours(0,0,0,0);
  if (d < today) return;
  input.value = formatDateISO(d);
  state.selectedSlot = null;
  loadSlots();
}

async function loadSlots() {
  const date = document.getElementById('dateInput').value;
  state.selectedDate = date;
  const container = document.getElementById('slotsContainer');
  container.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><br>טוען שעות פנויות...</div>';

  const d = new Date(date + 'T00:00:00');
  document.getElementById('dateLabel').textContent = `יום ${DAYS_HE[d.getDay()]}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;

  try {
    const serviceParam = state.selectedService ? `?service_id=${state.selectedService.id}` : '';
    const res = await fetch(`/api/booking/slots/${state.selectedBarber.id}/${date}${serviceParam}`);
    const data = await res.json();

    if (data.reason || !data.slots || data.slots.length === 0) {
      container.innerHTML = `<div class="no-slots"><i class="fas fa-calendar-times"></i>${data.reason || 'אין שעות פנויות ביום זה'}<br><small>נסו לבחור תאריך אחר</small></div>`;
      return;
    }

    container.innerHTML = '<div class="slots-grid">' + data.slots.map(s => `
      <button class="slot-btn" data-start="${s.start}" data-end="${s.end}" onclick="selectSlot(this, '${s.start}', '${s.end}')">
        ${s.start}
      </button>
    `).join('') + '</div>';
  } catch (e) {
    container.innerHTML = '<div class="no-slots"><i class="fas fa-exclamation-circle"></i>שגיאה בטעינת שעות</div>';
  }
}

function selectSlot(el, start, end) {
  state.selectedSlot = { start, end };
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  setTimeout(() => goToStep(3), 200);
}

function renderSummary() {
  const d = new Date(state.selectedDate + 'T00:00:00');
  document.getElementById('bookingSummary').innerHTML = `
    <div class="summary-row"><span class="label">ספר</span><span class="value">${state.selectedBarber.name}</span></div>
    <div class="summary-row"><span class="label">תאריך</span><span class="value">יום ${DAYS_HE[d.getDay()]}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}</span></div>
    <div class="summary-row"><span class="label">שעה</span><span class="value">${state.selectedSlot.start} - ${state.selectedSlot.end}</span></div>
    <div class="summary-row"><span class="label">שירות</span><span class="value">${state.selectedService ? state.selectedService.name + ' (' + state.selectedService.duration + ' דק\' - ₪' + state.selectedService.price + ')' : 'תספורת'}</span></div>
  `;
}

async function confirmBooking() {
  const btn = document.getElementById('confirmBtn');
  if (btn.disabled) return; // Prevent double-click

  const name = document.getElementById('clientName').value.trim();
  const phone = document.getElementById('clientPhone').value.trim();
  const errEl = document.getElementById('bookingError');
  errEl.style.display = 'none';

  if (!name) { showError('נא להזין שם'); return; }
  if (!phone) { showError('נא להזין טלפון'); return; }
  if (phone.replace(/[-\s]/g, '').length < 9) { showError('מספר טלפון קצר מדי'); return; }
  if (!document.getElementById('privacyConsent').checked) { showError('נא לאשר את מדיניות הפרטיות'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> שולח...';

  // Log privacy consent
  try {
    await fetch('/api/consents/booking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        client_name: name,
        client_phone: phone,
        consent_text: 'אני מאשר/ת כי קראתי את מדיניות הפרטיות ומסכים/ה לאיסוף ושמירת הפרטים שלי לצורך ניהול תורים ויצירת קשר בנוגע לתור שנקבע.'
      })
    });
  } catch(e) { /* consent log failure should not block booking */ }

  try {
    const res = await fetch('/api/booking/book', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        barber_id: state.selectedBarber.id,
        service_id: state.selectedService ? state.selectedService.id : null,
        date: state.selectedDate,
        start_time: state.selectedSlot.start,
        client_name: name,
        client_phone: phone
      })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'שגיאה'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-calendar-check"></i> אישור הזמנה'; return; }

    // Success
    const d = new Date(state.selectedDate + 'T00:00:00');
    document.getElementById('successDetails').innerHTML = `
      <div class="summary-row"><span class="label">ספר</span><span class="value">${data.details.barber}</span></div>
      <div class="summary-row"><span class="label">תאריך</span><span class="value">יום ${DAYS_HE[d.getDay()]}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}</span></div>
      <div class="summary-row"><span class="label">שעה</span><span class="value">${data.details.time}</span></div>
      <div class="summary-row"><span class="label">שירות</span><span class="value">${data.details.service}</span></div>
    `;
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('stepSuccess').classList.add('active');
    document.querySelectorAll('.step-dot').forEach(d => { d.classList.remove('active'); d.classList.add('done'); });
    document.querySelectorAll('.step-line').forEach(l => l.classList.add('done'));
  } catch (e) {
    showError('שגיאת תקשורת, נסה שוב');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-calendar-check"></i> אישור הזמנה';
  }
}

function showError(msg) {
  const el = document.getElementById('bookingError');
  el.textContent = msg;
  el.style.display = 'block';
}

// === Returning Client Lookup ===
let phoneLookupTimer = null;
let lastLookedUpPhone = '';
state.returningClient = null;

function onPhoneInput(val) {
  const clean = val.replace(/[-\s]/g, '');
  if (clean.length >= 9 && clean !== lastLookedUpPhone) {
    clearTimeout(phoneLookupTimer);
    phoneLookupTimer = setTimeout(() => lookupClient(clean), 400);
  } else if (clean.length < 9) {
    hideWelcomeBanner();
  }
}

async function lookupClient(phone) {
  lastLookedUpPhone = phone;
  try {
    const res = await fetch(`/api/booking/client-lookup/${phone}`);
    const data = await res.json();
    if (data.found) {
      showWelcomeBanner(data);
    } else {
      hideWelcomeBanner();
    }
  } catch(e) { hideWelcomeBanner(); }
}

function showWelcomeBanner(data) {
  const banner = document.getElementById('welcomeBanner');
  const c = data.client;
  state.returningClient = data;

  // Set name
  document.getElementById('clientName').value = c.name;

  // Welcome text
  let tierBadge = '';
  if (c.total_visits >= 20) tierBadge = '<span class="loyalty-badge" style="background:#F59E0B"><i class="fas fa-crown"></i> זהב</span>';
  else if (c.total_visits >= 10) tierBadge = '<span class="loyalty-badge" style="background:#9CA3AF"><i class="fas fa-medal"></i> כסף</span>';
  else if (c.total_visits >= 3) tierBadge = '<span class="loyalty-badge" style="background:#CD7F32"><i class="fas fa-award"></i> ארד</span>';

  document.getElementById('welcomeName').innerHTML = `!ברוך הבא בחזרה, ${escH(c.name)} ${tierBadge}`;
  document.getElementById('welcomeVisits').textContent = `ביקור מספר ${c.total_visits + 1} 🎉`;

  // Last appointment info
  const lastInfo = document.getElementById('lastVisitInfo');
  const rebookBtn = document.getElementById('rebookBtn');
  if (data.lastAppointment) {
    const la = data.lastAppointment;
    const d = new Date(la.date + 'T00:00:00');
    lastInfo.innerHTML = `<i class="fas fa-history"></i> בפעם האחרונה היית אצל <strong>${escH(la.barber_name)}</strong> ל<strong>${escH(la.service_name)}</strong> (${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()})`;
    lastInfo.style.display = 'block';
    rebookBtn.style.display = 'inline-flex';
  } else {
    lastInfo.style.display = 'none';
    rebookBtn.style.display = 'none';
  }

  banner.classList.add('show');
}

function hideWelcomeBanner() {
  document.getElementById('welcomeBanner').classList.remove('show');
  state.returningClient = null;
}

function rebookLast() {
  if (!state.returningClient || !state.returningClient.lastAppointment) return;
  const la = state.returningClient.lastAppointment;

  // Select the barber
  const barber = state.barbers.find(b => b.id === la.barber_id);
  if (barber) {
    state.selectedBarber = barber;
    document.querySelectorAll('.barber-card').forEach(c => c.classList.toggle('selected', parseInt(c.dataset.id) === barber.id));
  }

  // Select the service
  const service = state.services.find(s => s.id === la.service_id);
  if (service) {
    state.selectedService = service;
  }

  // Go to step 2 to pick date/time
  goToStep(2);
}

function escH(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

// === Accessibility ===
let a11yFont = parseInt(localStorage.getItem('a11y_font') || '0');
(function initBookA11y() {
  if (a11yFont !== 0) document.documentElement.style.fontSize = (15 + a11yFont * 2) + 'px';
  if (localStorage.getItem('a11y_contrast') === '1') document.body.classList.add('high-contrast');
  if (localStorage.getItem('a11y_links') === '1') document.body.classList.add('highlight-links');
})();
function a11yFontSize(dir) {
  if (dir === 0) a11yFont = 0; else a11yFont = Math.max(-2, Math.min(4, a11yFont + dir));
  document.documentElement.style.fontSize = (15 + a11yFont * 2) + 'px';
  localStorage.setItem('a11y_font', a11yFont);
}
function a11yContrast() {
  document.body.classList.toggle('high-contrast');
  localStorage.setItem('a11y_contrast', document.body.classList.contains('high-contrast') ? '1' : '0');
}
function a11yLinks() {
  document.body.classList.toggle('highlight-links');
  localStorage.setItem('a11y_links', document.body.classList.contains('highlight-links') ? '1' : '0');
}

function resetBooking() {
  state.selectedBarber = null;
  state.selectedService = null;
  state.selectedSlot = null;
  state.selectedDate = null;
  state.returningClient = null;
  lastLookedUpPhone = '';
  document.getElementById('clientName').value = '';
  document.getElementById('clientPhone').value = '';
  document.querySelectorAll('.barber-card').forEach(c => c.classList.remove('selected'));
  const btn = document.getElementById('confirmBtn');
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-calendar-check"></i> אישור הזמנה';
  document.getElementById('bookingError').style.display = 'none';
  document.getElementById('privacyConsent').checked = false;
  hideWelcomeBanner();
  // Reset date to today
  const dateInput = document.getElementById('dateInput');
  dateInput.value = formatDateISO(new Date());
  goToStep(1);
}

// Toggle a11y panel
document.addEventListener('DOMContentLoaded', () => {
  const toggle = document.getElementById('a11yToggleBook');
  const panel = document.getElementById('a11yPanelBook');
  if (toggle && panel) {
    toggle.addEventListener('click', () => panel.classList.toggle('hidden'));
    document.addEventListener('click', (e) => { if (!e.target.closest('.a11y-widget')) panel.classList.add('hidden'); });
  }
});
</script>

<!-- Accessibility Widget -->
<div class="a11y-widget">
  <button class="a11y-toggle" id="a11yToggleBook" aria-label="תפריט נגישות" title="נגישות">
    <i class="fas fa-universal-access" aria-hidden="true"></i>
  </button>
  <div class="a11y-panel hidden" id="a11yPanelBook" role="region" aria-label="אפשרויות נגישות">
    <h4>נגישות</h4>
    <button onclick="a11yFontSize(1)" aria-label="הגדל גופן"><i class="fas fa-plus" aria-hidden="true"></i> הגדל גופן</button>
    <button onclick="a11yFontSize(-1)" aria-label="הקטן גופן"><i class="fas fa-minus" aria-hidden="true"></i> הקטן גופן</button>
    <button onclick="a11yFontSize(0)" aria-label="אפס גודל גופן"><i class="fas fa-undo" aria-hidden="true"></i> גופן רגיל</button>
    <button onclick="a11yContrast()" aria-label="החלף ניגודיות"><i class="fas fa-adjust" aria-hidden="true"></i> ניגודיות גבוהה</button>
    <button onclick="a11yLinks()" aria-label="הדגש קישורים"><i class="fas fa-link" aria-hidden="true"></i> הדגש קישורים</button>
    <a href="/accessibility.html" style="display:block;text-align:center;margin-top:0.5rem;color:var(--primary);font-size:0.85rem">הצהרת נגישות</a>
  </div>
</div>
</body>
</html>
